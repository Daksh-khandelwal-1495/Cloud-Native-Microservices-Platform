name: Build Android APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Desktop/MyGame/package-lock.json
      - run: cd Desktop/MyGame && npm install
      - run: cd Desktop/MyGame && npm run build
      - run: cd Desktop/MyGame && npx cap sync android
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - run: |
          cd Desktop/MyGame/android
          chmod +x gradlew
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: mygame-debug-apk
          path: Desktop/MyGame/android/app/build/outputs/apk/debug/app-debug.apk
